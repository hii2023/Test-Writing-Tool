<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOSH7 Trigger Engine V8</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card {
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
select,input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
.output {
  background:#f1f8e9;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  white-space:pre-line;
}
button {
  background:#2e7d32;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.copyBtn {
  margin-top:5px;
  background:#1565c0;
}
</style>
</head>

<body>

<h2>NOSH7 Trigger-Based Lead Engine</h2>

<div class="card">

<input id="name" placeholder="Lead Name">

<select id="category">
<option value="Gym">Gym</option>
<option value="Yoga">Yoga Classes</option>
<option value="Dietitian">Dietitian / Nutritionist</option>
<option value="Trainer">Personal Trainer</option>
<option value="Lab">Laboratory</option>
<option value="WeightLoss">Weight Loss Services</option>
<option value="Corporate">Corporate</option>
</select>

<select id="stage">
<option value="New">New Lead</option>
<option value="Interested">Interested</option>
<option value="Confused">Confused</option>
<option value="NoResponse">Not Responding</option>
<option value="Ready">Ready to Close</option>
</select>

<select id="mode">
<option value="WhatsApp">WhatsApp</option>
<option value="Email">Email</option>
</select>

<button onclick="generate()">Generate Message</button>

</div>

<div class="card">
<h3>Subject</h3>
<div id="subject" class="output"></div>
<button class="copyBtn" onclick="copy('subject')">Copy Subject</button>
</div>

<div class="card">
<h3>Message Option 1</h3>
<div id="msg1" class="output"></div>
<button class="copyBtn" onclick="copy('msg1')">Copy Message 1</button>
</div>

<div class="card">
<h3>Message Option 2</h3>
<div id="msg2" class="output"></div>
<button class="copyBtn" onclick="copy('msg2')">Copy Message 2</button>
</div>

<div class="card">
<h3>Trigger Insight</h3>
<div id="insight" class="output"></div>
</div>

<script>

const triggers = {
Gym: "Focus on member results and retention",
Yoga: "Focus on discipline and lifestyle alignment",
Dietitian: "Focus on diet compliance and outcomes",
Trainer: "Focus on faster transformation results",
Lab: "Focus on converting reports into action",
WeightLoss: "Focus on retention and visible results",
Corporate: "Focus on employee wellness execution"
};

const data = {

Gym: {
New: [
"Hi {name}, most members train consistently but don’t see results due to diet gaps. We help gyms solve this by managing daily meals. Open to exploring a small pilot?",
"Hi {name}, a common drop-off reason in gyms is lack of visible progress. We handle diet execution so members actually see results. Worth a quick discussion?"
],
Interested: [
"Let’s test this with 2–3 members who are not seeing expected results. You should notice improved consistency quickly.",
"We can start with members close to dropping off and improve their outcomes. This usually increases retention."
],
Confused: [
"No changes needed in your setup. We only handle the meal side for your members.",
"Think of this as support for results, not an additional process."
],
NoResponse: [
"Checking if improving member results through diet support is relevant right now.",
"Closing this for now. Happy to reconnect if needed later."
],
Ready: [
"Let’s begin with a few members. Share details and we will activate.",
"We can onboard immediately and start supporting your members."
]
},

Dietitian: {
New: [
"Hi {name}, most clients struggle to follow diet plans consistently. We help ensure execution through ready meals aligned to your guidance.",
"Hi {name}, the gap is rarely planning, it’s compliance. We help convert your plans into daily action through meals."
],
Interested: [
"Let’s start with 2 clients who struggle with adherence. You will see improved consistency.",
"We can align meals with your plans for a small set of clients and track results."
],
Confused: [
"This doesn’t change your process. We only support execution.",
"We work behind your plan, not instead of it."
],
NoResponse: [
"Checking if this is relevant for your clients currently.",
"Closing this for now. Let me know if needed later."
],
Ready: [
"Please share initial clients and we will begin.",
"We can activate immediately and align with your plans."
]
}

};

function generate(){

let name = document.getElementById("name").value || "";
let cat = document.getElementById("category").value;
let stage = document.getElementById("stage").value;
let mode = document.getElementById("mode").value;

let msgArr = data[cat][stage];

let m1 = msgArr[0].replace("{name}",name);
let m2 = msgArr[1].replace("{name}",name);

if(mode === "Email"){
document.getElementById("subject").innerText = "Improving outcomes through structured nutrition execution";
m1 = "Dear "+name+",\n\n"+m1+"\n\nRegards\nNOSH7";
m2 = "Dear "+name+",\n\n"+m2+"\n\nRegards\nNOSH7";
}else{
document.getElementById("subject").innerText = "Not applicable";
}

document.getElementById("msg1").innerText = m1;
document.getElementById("msg2").innerText = m2;

document.getElementById("insight").innerText = triggers[cat];

}

function copy(id){
let text = document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
alert("Copied");
}

</script>

</body>
</html>
