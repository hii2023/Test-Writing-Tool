<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOSH7 Lead Engine V7</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#fff3e0,#e8f5e9);
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card {
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
select,input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
.output {
  background:#f1f8e9;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  white-space:pre-line;
}
button {
  background:#2e7d32;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>NOSH7 Lead Conversion Engine</h2>

<div class="card">

<input id="name" placeholder="Lead Name">

<select id="category">
<option value="Gym">Gym</option>
<option value="Yoga">Yoga Classes</option>
<option value="Dietitian">Dietitian / Nutritionist</option>
<option value="Trainer">Personal Trainer</option>
<option value="Lab">Laboratory</option>
<option value="WeightLoss">Weight Loss Services</option>
<option value="Corporate">Corporate / Gifting</option>
</select>

<select id="stage">
<option value="New">New Lead</option>
<option value="Contacted">Contacted</option>
<option value="Interested">Interested</option>
<option value="Confused">Confused</option>
<option value="NoResponse">Not Responding</option>
<option value="Ready">Ready to Close</option>
</select>

<select id="mode">
<option value="WhatsApp">WhatsApp</option>
<option value="Email">Email</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="downloadExcel()">Download All Messages (Excel)</button>

</div>

<div class="card">
<h3>Subject</h3>
<div id="subject" class="output"></div>
</div>

<div class="card">
<h3>Message Option 1</h3>
<div id="msg1" class="output"></div>
</div>

<div class="card">
<h3>Message Option 2</h3>
<div id="msg2" class="output"></div>
</div>

<div class="card">
<h3>What to Do Next</h3>
<div id="next" class="output"></div>
</div>

<script>

const messages = {

Gym: {
New: [
"Hi {name}, we help gym members stay consistent with diet through ready meals. This improves visible results. Can we explore a small pilot?",
"Hi {name}, many gyms struggle with members not following diet. We solve this with ready-to-eat structured meals. Open to a quick discussion?"
],
Contacted: [
"Following up. Gyms we work with saw better transformation results once meals were managed. We can start with a few members.",
"Quick follow-up. Instead of relying on members to prepare meals, we handle execution. This improves retention."
],
Interested: [
"Let us start with 2 members. We will handle meals and delivery. You focus on training.",
"We can begin with a small pilot to validate results before scaling."
],
Confused: [
"We can simplify this. Start with one member. No process change required.",
"No complexity. We just support meal execution for your members."
],
NoResponse: [
"Checking if this is relevant currently. If not, I can reconnect later.",
"Closing this for now. Let me know if you want to revisit."
],
Ready: [
"Let us begin. Share initial member details and we will activate.",
"We can onboard immediately and start delivery."
]
},

Dietitian: {
New: [
"Hi {name}, we help ensure your clients follow diet plans through ready meals. This improves outcomes. Can we explore?",
"Hi {name}, diet compliance is a major gap. We solve it by delivering structured meals. Open to discussion?"
],
Contacted: [
"Following up. Dietitians we work with saw better adherence once meals were handled.",
"We support execution so your plans translate into results."
],
Interested: [
"Let us begin with 2 clients. We manage meals and delivery.",
"Start with a small pilot to validate results."
],
Confused: [
"Start with one client. No complexity involved.",
"We integrate without changing your process."
],
NoResponse: [
"Checking relevance. Should I reconnect later?",
"Closing for now. Let me know if needed."
],
Ready: [
"Please share initial clients. We will begin immediately.",
"We can activate today."
]
}

};

function generate(){

let name = document.getElementById("name").value || "";
let cat = document.getElementById("category").value;
let stage = document.getElementById("stage").value;
let mode = document.getElementById("mode").value;

let msgArr = messages[cat][stage];

let m1 = msgArr[0].replace("{name}",name);
let m2 = msgArr[1].replace("{name}",name);

if(mode === "Email"){
document.getElementById("subject").innerText = "Improving client outcomes through structured nutrition";
m1 = "Dear "+name+",\n\n"+m1+"\n\nRegards\nNOSH7";
m2 = "Dear "+name+",\n\n"+m2+"\n\nRegards\nNOSH7";
}else{
document.getElementById("subject").innerText = "Not applicable";
}

document.getElementById("msg1").innerText = m1;
document.getElementById("msg2").innerText = m2;

document.getElementById("next").innerText =
stage==="New"?"Send and wait 24 hours":
stage==="Contacted"?"Push for small pilot":
stage==="Interested"?"Close quickly":
stage==="Confused"?"Reduce complexity":
stage==="NoResponse"?"Trigger response":
"Close immediately";

}

function downloadExcel(){

let rows = [["Category","Stage","Message1","Message2"]];

for(let cat in messages){
 for(let st in messages[cat]){
  rows.push([cat,st,messages[cat][st][0],messages[cat][st][1]]);
 }
}

let csv = rows.map(e=>e.join(",")).join("\n");

let blob = new Blob([csv]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "messages.csv";
a.click();
}

</script>

</body>
</html>
