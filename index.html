<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOSH7 Lead Engine V6</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#f1f8e9);
  max-width:1000px;
  margin:auto;
  padding:20px;
}
h1 { color:#1b5e20; }

.card {
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input,textarea,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#1b5e20;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.output {
  background:#f9fbe7;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>NOSH7 Lead Maturity Engine V6</h1>

<div class="card">

<input id="name" placeholder="Lead Name">

<select id="category">
<option value="gym">Gym</option>
<option value="yoga">Yoga Classes</option>
<option value="diet">Dietitian / Nutritionist</option>
<option value="pt">Gym Personal Trainer</option>
<option value="lab">Laboratory</option>
<option value="weight">Weight Loss Services</option>
<option value="corporate">Corporate / Gift Supplier</option>
</select>

<select id="stage">
<option value="new">New Lead</option>
<option value="contacted">Contacted</option>
<option value="interested">Interested</option>
<option value="confused">Confused</option>
<option value="notresponding">Not Responding</option>
<option value="ready">Ready to Close</option>
</select>

<select id="mode">
<option value="whatsapp">WhatsApp</option>
<option value="email">Email</option>
</select>

<button onclick="generate()">Generate</button>

</div>

<div class="card">
<h3>Subject (Email Only)</h3>
<div id="subject" class="output"></div>
</div>

<div class="card">
<h3>Message Option 1</h3>
<div id="script1" class="output"></div>
</div>

<div class="card">
<h3>Message Option 2</h3>
<div id="script2" class="output"></div>
</div>

<div class="card">
<h3>Strategy Insight</h3>
<div id="insight" class="output"></div>
</div>

<script>

function generate(){

let name = document.getElementById("name").value || "";
let stage = document.getElementById("stage").value;
let category = document.getElementById("category").value;
let mode = document.getElementById("mode").value;

let base = {

gym: "help your members stay consistent with diet and improve visible results",
yoga: "support your members with structured nutrition aligned to wellness goals",
diet: "ensure your clients actually follow prescribed diet plans",
pt: "help your clients get faster transformation results",
lab: "extend your diagnostic insights into actionable nutrition solutions",
weight: "improve client outcomes through structured daily nutrition",
corporate: "offer healthy meal solutions as part of employee wellness programs"

};

let subject = "Partnership to improve client outcomes through nutrition execution";

let data = {

new: {
s1: `Hi ${name},

We work with partners to ${base[category]}.

We provide ready-to-eat structured meals so clients follow plans without drop-offs.

Would it make sense to explore a small pilot?`,

s2: `Hi ${name},

One gap we see across ${category} businesses is diet compliance.

We solve this by delivering ready meals aligned to goals.

Can we connect briefly to explore fit?`,

insight: "Keep it short. Focus on problem recognition."
},

contacted: {
s1: `Hi ${name},

Following up on this.

Most partners we work with saw improved results once meals were handled externally.

We can start with a small set of clients.`,

s2: `Hi ${name},

Sharing a quick thought.

Instead of relying on clients to prepare meals, we manage execution.

This improves retention and outcomes.`,

insight: "Reinforce value. Push small start."
},

interested: {
s1: `Hi ${name},

Let us begin with 2 clients.

We will handle meals, delivery and consistency.

You focus on guidance.`,

s2: `Hi ${name},

We can start with a controlled pilot.

This will help validate results before scaling.`,

insight: "Move fast to pilot."
},

confused: {
s1: `Hi ${name},

We can simplify this.

Start with one client. No complexity.

You will see results directly.`,

s2: `Hi ${name},

No need to change your process.

We just support meal execution.`,

insight: "Remove friction and complexity."
},

notresponding: {
s1: `Hi ${name},

Checking if this is relevant for you currently.

If not, I can reconnect later.`,

s2: `Hi ${name},

Closing this for now.

Let me know if you want to revisit.`,

insight: "Trigger response using exit intent."
},

ready: {
s1: `Hi ${name},

We can begin immediately.

Please share initial client details.`,

s2: `Hi ${name},

Let us activate this today.

We will onboard and start delivery.`,

insight: "Close without delay."
}

};

let msg1 = data[stage].s1;
let msg2 = data[stage].s2;

if(mode === "email"){
  msg1 = "Dear " + name + ",\n\n" + msg1 + "\n\nRegards\nNOSH7";
  msg2 = "Dear " + name + ",\n\n" + msg2 + "\n\nRegards\nNOSH7";
  document.getElementById("subject").innerText = subject;
} else {
  document.getElementById("subject").innerText = "Not applicable for WhatsApp";
}

document.getElementById("script1").innerText = msg1;
document.getElementById("script2").innerText = msg2;
document.getElementById("insight").innerText = data[stage].insight;

}

</script>

</body>
</html>
