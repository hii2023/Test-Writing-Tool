<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOSH7 Lead Maturity Engine</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#e0f7fa,#fce4ec);
  padding:20px;
  max-width:900px;
  margin:auto;
}
h1 { color:#2c7a7b; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select,input,textarea,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#2c7a7b;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.output {
  background:#f1f8e9;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>🔥 NOSH7 Lead Maturity Engine</h1>

<div class="card">

<label>Lead Name</label>
<input id="name" placeholder="Enter name">

<label>Lead Stage</label>
<select id="stage">
<option value="new">New Lead</option>
<option value="contacted">Contacted</option>
<option value="interested">Interested</option>
<option value="confused">Confused</option>
<option value="notresponding">Not Responding</option>
<option value="ready">Ready to Close</option>
</select>

<button onclick="generate()">Generate Strategy</button>

</div>

<div class="card">
<h3>💬 What to Say</h3>
<div id="script" class="output"></div>
</div>

<div class="card">
<h3>🧠 What’s Happening</h3>
<div id="insight" class="output"></div>
</div>

<div class="card">
<h3>📊 What You Should Do Next</h3>
<div id="action" class="output"></div>
</div>

<div class="card">
<h3>⚡ Pro Tip</h3>
<div id="tip" class="output"></div>
</div>

<script>

function generate(){

let name = document.getElementById("name").value || "";
let stage = document.getElementById("stage").value;

let data = {

new: {
script: `Hi ${name} 👋

We help clients follow diet with ready healthy meals (NOSH7).

You can also earn per referral.

Quick connect?`,

insight: "Lead doesn't know you. Keep it short. No overload.",

action: "Send message → Wait 24 hrs → Follow-up if no reply.",

tip: "First message = curiosity, not full pitch."
},

contacted: {
script: `Hi ${name}, just checking 🙂

Most partners we work with faced one issue — clients not following diet.

We solved that with ready meals.

Can we try with 1–2 clients?`,

insight: "Lead has seen you but not convinced.",

action: "Push for small trial, not full commitment.",

tip: "Reduce risk → Increase conversion."
},

interested: {
script: `Great ${name} 🙌

Let’s start with 2 clients.

We’ll handle everything — meals + delivery.

You just guide them.`,

insight: "Lead wants this but needs push.",

action: "Close fast. Don’t delay.",

tip: "Momentum = conversion."
},

confused: {
script: `Totally understand ${name} 🙂

Let’s keep it simple.

We can start with just 1 client — no pressure.

You’ll see results first.`,

insight: "Fear of risk or complexity.",

action: "Simplify + reduce decision load.",

tip: "Confusion kills sales. Simplicity converts."
},

notresponding: {
script: `Hi ${name}, just closing loop 🙂

Should I keep this on hold for now?`,

insight: "Lead is ignoring. Needs trigger.",

action: "Use reverse psychology.",

tip: "Scarcity + exit message = response trigger."
},

ready: {
script: `Perfect ${name} 🙌

Let’s start today.

Share 1–2 client details and we’ll begin immediately.`,

insight: "Lead is ready but waiting.",

action: "Push immediate action.",

tip: "Delay = drop. Close NOW."
}

};

document.getElementById("script").innerText = data[stage].script;
document.getElementById("insight").innerText = data[stage].insight;
document.getElementById("action").innerText = data[stage].action;
document.getElementById("tip").innerText = data[stage].tip;

}

</script>

</body>
</html>
