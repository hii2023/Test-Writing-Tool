<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSH7 Sales Engine Mobile</title>

<style>
body {
  font-family: Arial;
  margin:0;
  padding:12px;
  background:#f5f7fa;
}

h2 {
  font-size:22px;
  margin-bottom:10px;
}

.card {
  background:white;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

input, select {
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:16px;
  margin-top:12px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#2e7d32;
  color:white;
  font-weight:bold;
}

.copyBtn {
  background:#1565c0;
}

.output {
  background:#eef7ee;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  font-size:16px;
  line-height:1.5;
  white-space:pre-line;
}
</style>

</head>

<body>

<h2>NOSH7 Sales Engine</h2>

<div class="card">

<input id="name" placeholder="Enter Lead Name">

<select id="category">
<option>Gym</option>
<option>Yoga</option>
<option>Dietitian</option>
<option>Trainer</option>
<option>Lab</option>
<option>WeightLoss</option>
<option>Corporate</option>
</select>

<select id="stage">
<option>New</option>
<option>Interested</option>
<option>Confused</option>
<option>NoResponse</option>
<option>Ready</option>
</select>

<select id="mode">
<option>WhatsApp</option>
<option>Email</option>
<option>Call</option>
</select>

<button onclick="generate()">Generate Message</button>

</div>

<div class="card">
<h3>Subject</h3>
<div id="subject" class="output"></div>
<button class="copyBtn" onclick="copyText('subject')">Copy</button>
</div>

<div class="card">
<h3>Message 1</h3>
<div id="msg1" class="output"></div>
<button class="copyBtn" onclick="copyText('msg1')">Copy Message 1</button>
</div>

<div class="card">
<h3>Message 2</h3>
<div id="msg2" class="output"></div>
<button class="copyBtn" onclick="copyText('msg2')">Copy Message 2</button>
</div>

<div class="card">
<h3>What triggers this lead</h3>
<div id="insight" class="output"></div>
</div>

<div class="card">
<h3>How to handle this stage</h3>
<div id="guide" class="output"></div>
</div>

<script>

const triggers = {
Gym:"They care about visible results and member retention.",
Yoga:"They care about discipline and lifestyle alignment.",
Dietitian:"They care about client compliance and outcomes.",
Trainer:"They care about faster transformations.",
Lab:"They care about extending reports into action.",
WeightLoss:"They care about retention and visible progress.",
Corporate:"They care about easy wellness execution."
};

const guide = {
New:"Keep message short. Focus on problem.",
Interested:"Push for small pilot.",
Confused:"Simplify. Remove effort.",
NoResponse:"Use exit or trigger message.",
Ready:"Close immediately."
};

const db = {
Gym:{
New:["Members train but results don’t show due to diet gaps. We solve that by handling meals.",
"Retention drops when results are not visible. We support diet execution."]
},
Yoga:{
New:["Members follow yoga but not diet. We help align both.",
"We extend yoga into daily lifestyle through meals."]
},
Dietitian:{
New:["Clients don’t follow diet plans consistently. We solve execution.",
"We convert plans into daily meals."]
},
Trainer:{
New:["Clients depend on you but diet is uncontrolled. We fix that.",
"Faster results need controlled diet."]
},
Lab:{
New:["Patients don’t act on reports. We enable action.",
"We convert reports into daily nutrition."]
},
WeightLoss:{
New:["Clients drop without results. We improve consistency.",
"Retention improves with structured meals."]
},
Corporate:{
New:["Wellness programs fail in execution. We solve that.",
"We provide ready nutrition for employees."]
}
};

function generate(){

let name = document.getElementById("name").value || "";
let cat = document.getElementById("category").value;
let stage = document.getElementById("stage").value;
let mode = document.getElementById("mode").value;

let msgs = db[cat][stage] || ["We support better outcomes through nutrition.","We improve consistency through structured meals."];

let m1 = "Hi "+name+"\n\n"+msgs[0];
let m2 = "Hi "+name+"\n\n"+msgs[1];

if(mode==="Email"){
document.getElementById("subject").innerText="Improving outcomes through nutrition";
m1="Dear "+name+",\n\n"+msgs[0]+"\n\nRegards\nNOSH7";
m2="Dear "+name+",\n\n"+msgs[1]+"\n\nRegards\nNOSH7";
}
else if(mode==="Call"){
document.getElementById("subject").innerText="Call Script";
m1="Hi "+name+", calling from NOSH7.\n\n"+msgs[0]+"\n\nLet’s test with few clients.";
m2="Hi "+name+", quick call from NOSH7.\n\n"+msgs[1]+"\n\nCan we try with few?";
}
else{
document.getElementById("subject").innerText="Not applicable";
}

document.getElementById("msg1").innerText=m1;
document.getElementById("msg2").innerText=m2;
document.getElementById("insight").innerText=triggers[cat];
document.getElementById("guide").innerText=guide[stage];

}

function copyText(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

</script>

</body>
</html>
