<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOSH7 Sales Engine V9</title>

<style>
body {
  font-family: Arial;
  margin:0;
  padding:10px;
  background:#f4f6f8;
}
.card {
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
input, select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
}
.output {
  background:#eef7ee;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  white-space:pre-line;
  font-size:14px;
}
button {
  background:#2e7d32;
  color:white;
  border:none;
}
.copyBtn {
  background:#1565c0;
  margin-top:5px;
}
h3 {
  margin-bottom:5px;
}
</style>
</head>

<body>

<h3>NOSH7 Sales Engine</h3>

<div class="card">

<input id="name" placeholder="Lead Name">

<select id="category">
<option>Gym</option>
<option>Yoga</option>
<option>Dietitian</option>
<option>Trainer</option>
<option>Lab</option>
<option>WeightLoss</option>
<option>Corporate</option>
</select>

<select id="stage">
<option>New</option>
<option>Interested</option>
<option>Confused</option>
<option>NoResponse</option>
<option>Ready</option>
</select>

<select id="mode">
<option>WhatsApp</option>
<option>Email</option>
<option>Call</option>
</select>

<button onclick="generate()">Generate</button>

</div>

<div class="card">
<h3>Subject</h3>
<div id="subject" class="output"></div>
<button class="copyBtn" onclick="copy('subject')">Copy</button>
</div>

<div class="card">
<h3>Message 1</h3>
<div id="msg1" class="output"></div>
<button class="copyBtn" onclick="copy('msg1')">Copy</button>
</div>

<div class="card">
<h3>Message 2</h3>
<div id="msg2" class="output"></div>
<button class="copyBtn" onclick="copy('msg2')">Copy</button>
</div>

<div class="card">
<h3>Trigger Insight</h3>
<div id="insight" class="output"></div>
</div>

<div class="card">
<h3>Lead Stage Guide</h3>
<div id="guide" class="output"></div>
</div>

<script>

const triggers = {
Gym:"Members want visible results and retention",
Yoga:"Members seek discipline and lifestyle alignment",
Dietitian:"Focus is on compliance and outcomes",
Trainer:"Faster transformation = higher value",
Lab:"Reports need actionable follow-up",
WeightLoss:"Retention depends on visible results",
Corporate:"Wellness must be easy and scalable"
};

const stageGuide = {
New:"Lead does not know you. Keep message short and relevant.",
Interested:"Lead sees value. Push for trial or pilot.",
Confused:"Lead fears complexity. Simplify.",
NoResponse:"Lead is ignoring. Use trigger or exit message.",
Ready:"Lead is convinced. Close immediately."
};

const db = {

Gym:{
New:[
"Most members train but don’t see results due to diet gaps. We help gyms fix this through daily meals.",
"Retention drops when results are not visible. We support diet execution so members stay consistent."
],
Interested:[
"Let’s try this with 2–3 members not seeing results.",
"Start with members close to dropping. You will see impact quickly."
],
Confused:[
"No change in your setup. We only handle meals.",
"This works as support, not an extra process."
],
NoResponse:[
"Checking if improving member results is relevant now.",
"Closing for now. Can reconnect later."
],
Ready:[
"Share member details and we will begin.",
"We can start immediately."
]
},

Yoga:{
New:[
"Many members follow yoga but not diet. We help align both.",
"We extend yoga practice into daily lifestyle through meals."
],
Interested:[
"Start with a few members for better discipline.",
"We can support members struggling with consistency."
],
Confused:[
"No change in your sessions. We support outside class.",
"This complements your practice."
],
NoResponse:[
"Checking relevance for your members.",
"Closing for now."
],
Ready:[
"Let’s begin with few members.",
"We can activate today."
]
},

Dietitian:{
New:[
"Clients don’t follow diet plans consistently. We solve execution.",
"We convert diet plans into daily meals."
],
Interested:[
"Start with 2 clients struggling with adherence.",
"We align meals with your plans."
],
Confused:[
"We support your plan, not replace it.",
"No process change required."
],
NoResponse:[
"Checking relevance for your clients.",
"Closing for now."
],
Ready:[
"Share client details to begin.",
"We can activate immediately."
]
},

Trainer:{
New:[
"Clients depend on you but diet is uncontrolled. We fix that.",
"Faster transformations need controlled diet."
],
Interested:[
"Start with 1–2 clients for faster results.",
"We can support transformation cases."
],
Confused:[
"We only handle meals.",
"No extra work for you."
],
NoResponse:[
"Checking if relevant.",
"Closing for now."
],
Ready:[
"Let’s onboard first client.",
"We can start today."
]
},

Lab:{
New:[
"Patients get reports but don’t act. We enable action.",
"We convert reports into daily nutrition."
],
Interested:[
"Start with lifestyle patients.",
"Use as post-report solution."
],
Confused:[
"We extend your service.",
"No change required."
],
NoResponse:[
"Checking relevance.",
"Closing for now."
],
Ready:[
"Let’s activate for selected patients.",
"We can start immediately."
]
},

WeightLoss:{
New:[
"Clients drop without results. We improve consistency.",
"Retention improves with structured meals."
],
Interested:[
"Start with few clients.",
"Improve adherence quickly."
],
Confused:[
"We support your program.",
"No changes needed."
],
NoResponse:[
"Checking relevance.",
"Closing for now."
],
Ready:[
"Let’s begin with initial clients.",
"We can activate today."
]
},

Corporate:{
New:[
"Wellness programs fail in execution. We solve that.",
"We provide ready nutrition for employees."
],
Interested:[
"Start with small team pilot.",
"Run short wellness program."
],
Confused:[
"No admin effort needed.",
"We handle execution."
],
NoResponse:[
"Checking relevance.",
"Closing for now."
],
Ready:[
"Let’s start pilot.",
"We can begin immediately."
]
}

};

function generate(){

let name = document.getElementById("name").value || "";
let cat = document.getElementById("category").value;
let stage = document.getElementById("stage").value;
let mode = document.getElementById("mode").value;

let msgs = db[cat][stage];

let m1 = "Hi "+name+"\n\n"+msgs[0];
let m2 = "Hi "+name+"\n\n"+msgs[1];

if(mode==="Email"){
document.getElementById("subject").innerText="Improving outcomes through nutrition execution";
m1 = "Dear "+name+",\n\n"+msgs[0]+"\n\nRegards\nNOSH7";
m2 = "Dear "+name+",\n\n"+msgs[1]+"\n\nRegards\nNOSH7";
}
else if(mode==="Call"){
document.getElementById("subject").innerText="Call Script";
m1 = "Opening:\nHi "+name+", calling from NOSH7.\n\n"+msgs[0]+"\n\nClose:\nLet’s try with few clients.";
m2 = "Opening:\nHi "+name+", quick call from NOSH7.\n\n"+msgs[1]+"\n\nClose:\nCan we test this?";
}
else{
document.getElementById("subject").innerText="Not applicable";
}

document.getElementById("msg1").innerText=m1;
document.getElementById("msg2").innerText=m2;
document.getElementById("insight").innerText=triggers[cat];
document.getElementById("guide").innerText=stageGuide[stage];

}

function copy(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

</script>

</body>
</html>
